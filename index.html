<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Terminal</title>

<style>

body{
    background:black;
    color:#00ff00;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:650px;
}

h1{
    text-align:center;
}

textarea{
    width:100%;
    height:80px;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    padding:10px;
    font-family:monospace;
}

button{
    margin-top:10px;
    padding:8px 16px;
    background:black;
    color:#00ff00;
    border:1px solid #00ff00;
    cursor:pointer;
}

button:hover{
    background:#00ff00;
    color:black;
}

.output{
    margin-top:20px;
    padding:15px;
    border:1px solid #00ff00;
    min-height:80px;
    word-break:break-all;
}

.cursor{
    display:inline-block;
    width:10px;
    background:#00ff00;
    margin-left:3px;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="container">

<h1>TEXT → BINARY TERMINAL</h1>

<textarea id="textInput" placeholder="Enter text..."></textarea>

<button onclick="convert()">RUN</button>

<div class="output" id="output"></div>

</div>

<script>

function textToBinary(text){
    return text
        .split("")
        .map(c => c.charCodeAt(0).toString(2).padStart(8,"0"))
        .join("");
}

async function convert(){

    let text = document.getElementById("textInput").value;
    let binary = textToBinary(text);

    let output = document.getElementById("output");
    output.innerHTML = "";

    for(let i = 0; i < binary.length; i++){

        output.innerHTML += binary[i];

        await new Promise(resolve => setTimeout(resolve,15));

    }

    output.innerHTML += '<span class="cursor"></span>';

}

</script>

</body>
</html>
